name: Security Scan - NutriApp

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Verificación de secrets
      - name: Test Secrets
        run: echo "Secrets cargados correctamente"
        env:
          TEST1: ${{ secrets.JWT_SECRET }}
          TEST2: ${{ secrets.ADMIN_PASSWORD }}

      # 🔍 Escaneo de secretos (recomendado 🔥)
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2